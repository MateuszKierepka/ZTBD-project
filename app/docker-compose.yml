services:
  postgres:
    image: postgres:17
    container_name: ztbd-postgres
    environment:
      POSTGRES_DB: vod
      POSTGRES_USER: vod
      POSTGRES_PASSWORD: vod123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "synchronous_commit=off"
    deploy:
      resources:
        limits:
          memory: 2g

  mysql:
    image: mysql:8.0
    container_name: ztbd-mysql
    environment:
      MYSQL_DATABASE: vod
      MYSQL_USER: vod
      MYSQL_PASSWORD: vod123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - "--innodb-buffer-pool-size=1073741824"
      - "--innodb-log-file-size=256M"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-flush-method=O_DIRECT"
      - "--innodb-doublewrite=0"
      - "--innodb-change-buffering=all"
      - "--bulk-insert-buffer-size=256M"
      - "--local-infile=1"
      - "--max-allowed-packet=256M"
      - "--innodb-autoinc-lock-mode=2"
    deploy:
      resources:
        limits:
          memory: 2g

  mongo:
    image: mongo:8.0
    container_name: ztbd-mongo
    environment:
      MONGO_INITDB_DATABASE: vod
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--wiredTigerCacheSizeGB", "1.2"]
    deploy:
      resources:
        limits:
          memory: 2g

  neo4j:
    image: neo4j:2026.02.2
    container_name: ztbd-neo4j
    environment:
      NEO4J_AUTH: neo4j/vod12345
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 1g
      NEO4J_dbms_memory_transaction_total_max: 3g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 4g

volumes:
  postgres_data:
  mysql_data:
  mongo_data:
  neo4j_data:
